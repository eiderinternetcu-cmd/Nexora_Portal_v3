services:
  nginx:
    image: nginx:1.27-alpine
    container_name: nexora_nginx
    depends_on:
      - api
      - web_player
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx/nexoraplay.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/www/certbot:/var/www/certbot:ro
    networks:
      - nexora_net
    restart: unless-stopped

  api:
    build: .
    container_name: nexora_api
    command:
      - uvicorn
      - app.main:app
      - --host
      - 0.0.0.0
      - --port
      - "8000"
      - --proxy-headers
      - --forwarded-allow-ips=*
    env_file:
      - .env.production
    environment:
      APP_ENV: production
      DEBUG: "false"
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      REDIS_HOST: redis
      REDIS_PORT: "6379"
    expose:
      - "8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8000/health >/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - nexora_net
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: nexora_postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-nexora}
      POSTGRES_USER: ${POSTGRES_USER:-nexora}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - nexora_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER:-nexora}\" -d \"$${POSTGRES_DB:-nexora}\""]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - nexora_net
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: nexora_redis
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - nexora_redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - nexora_net
    restart: unless-stopped

  web_player:
    build:
      context: ./web_player
      dockerfile: Dockerfile
    container_name: nexora_web_player
    expose:
      - "80"
    depends_on:
      api:
        condition: service_healthy
    networks:
      - nexora_net
    restart: unless-stopped

volumes:
  nexora_pgdata:
  nexora_redisdata:

networks:
  nexora_net:
    driver: bridge
