# ─────────────────────────────────────────────────────────────────────────────
# EXAMPLE / STAGING ONLY — Nginx auth_request for /stream/* (FASE 5)
#
# DO NOT APPLY IN PRODUCTION YET. This is a reference of how to gate /stream/*
# with a playback token validated by FastAPI. It does NOT modify Flussonic.
#
# Rollout order (only after staging validation):
#   1. SIGNED_URL_ENFORCE=true so playback_url carries ?token=
#   2. Replace the plain /stream/* locations in nexoraplay.conf with the ones below
#   3. Reload Nginx; verify: no-token → 401, valid token → manifest 200
#
# Security notes:
#   - HTTPS + same-origin preserved; Flussonic origin IP never exposed.
#   - Access log hides the token query arg (see log_format below).
#   - The /__stream_auth internal location is NOT reachable directly (internal).
# ─────────────────────────────────────────────────────────────────────────────

# Hide the ?token=... value from access logs (define in http{} scope).
# map $request_uri $loggable_uri {
#     ~^(?<p>[^?]*)   $p;     # strip the query string entirely from logs
#     default         $request_uri;
# }
# log_format stream_safe '$remote_addr - [$time_local] "$request_method $loggable_uri" '
#                        '$status $body_bytes_sent';

server {
    # ... listen 443 ssl; server_name nexoraplay.net; (as in nexoraplay.conf)
    # access_log /var/log/nginx/stream.access.log stream_safe;

    # Internal auth check — not directly reachable from the internet.
    location = /__stream_auth {
        internal;
        proxy_pass http://nexora_api:8000/internal/stream-auth/validate;
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
        proxy_set_header X-Original-URI   $request_uri;   # /stream/<node>/<key>/...?token=
        proxy_set_header X-Original-Args  $args;          # query string (token=…)
        proxy_set_header X-Playback-Token $arg_token;     # token from the query string
        proxy_set_header X-Real-IP        $remote_addr;   # client IP (token IP-binding)
        proxy_set_header X-Forwarded-For  $remote_addr;   # client IP (segment grant key)
        # Optional explicit binding (captured by the regex location below):
        proxy_set_header X-Stream-Node    $snode;
        proxy_set_header X-Stream-Key     $skey;
    }

    # Optional: capture <node>/<key> explicitly so the backend doesn't have to
    # parse X-Original-URI. Use a regex location for BOTH manifest and segments.
    #   location ~ ^/stream/(?<snode>[^/]+)/(?<skey>[^/]+)/ {
    #       auth_request /__stream_auth; ... proxy_pass per node ...
    #   }
    # (If you keep the prefix locations below, $snode/$skey are empty and the
    #  backend falls back to parsing X-Original-URI — both paths are supported.)

    # ec-main edge — gated by playback token
    location ^~ /stream/ec-main/ {
        auth_request /__stream_auth;                     # 2xx → allow, 401/403 → deny
        error_page 401 = @stream_denied;
        error_page 403 = @stream_denied;

        proxy_pass http://181.78.246.211:8002/;          # Flussonic origin (unchanged, read-only)
        proxy_http_version 1.1;
        proxy_set_header Host $proxy_host;
        proxy_set_header Range $http_range;              # HLS byte-range
        proxy_set_header If-Range $http_if_range;
        proxy_buffering off;
        proxy_request_buffering off;
        proxy_read_timeout 60s;
        proxy_redirect off;
    }

    # co-main edge — gated by playback token
    location ^~ /stream/co-main/ {
        auth_request /__stream_auth;
        error_page 401 = @stream_denied;
        error_page 403 = @stream_denied;

        proxy_pass http://38.210.187.13:8002/;
        proxy_http_version 1.1;
        proxy_set_header Host $proxy_host;
        proxy_set_header Range $http_range;
        proxy_set_header If-Range $http_if_range;
        proxy_buffering off;
        proxy_request_buffering off;
        proxy_read_timeout 60s;
        proxy_redirect off;
    }

    # ec-quito edge (Quito Astra) — gated by playback token
    location ^~ /stream/ec-quito/ {
        auth_request /__stream_auth;
        error_page 401 = @stream_denied;
        error_page 403 = @stream_denied;

        proxy_pass http://45.70.202.171:8002/;           # Quito Astra origin (read-only)
        proxy_http_version 1.1;
        proxy_set_header Host $proxy_host;
        proxy_set_header Range $http_range;
        proxy_set_header If-Range $http_if_range;
        proxy_buffering off;
        proxy_request_buffering off;
        proxy_read_timeout 60s;
        proxy_redirect off;
    }

    location @stream_denied {
        default_type application/json;
        return 401 '{"success":false,"error":"playback token required or invalid"}';
    }
}

# HLS segments (C-PROD-1, implemented): the manifest (index.m3u8) is fetched
# with ?token=; the auth_request validates it AND seeds a short-lived Redis grant
# keyed by node+stream_key+client-IP (TTL = stream_auth_cache_ttl_seconds, ~180s,
# renewed on each segment). The relative media segments carry NO token; their
# auth_request hits the same /__stream_auth, which finds the grant (same node+
# stream+IP) and returns 200. No token in the segment is required.
# Invariant: the FIRST request must be the manifest (with token) to seed the grant;
# a segment with neither token nor grant → 401. Cross-stream/cross-IP → no grant → 401.
