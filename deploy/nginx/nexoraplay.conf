# Strip the ?token=... query from /stream access logs (defined in http{} scope;
# this file is included inside http{} via conf.d/*.conf).
map $request_uri $loggable_stream_uri {
    ~^(?<path_only>[^?]*)   $path_only;   # drop the query string entirely
    default                 $request_uri;
}
log_format stream_safe '$remote_addr - [$time_local] "$request_method $loggable_stream_uri" '
                       '$status $body_bytes_sent';

# Derive node + stream_key from the captured original URI (/stream/<node>/<key>/...).
# Passed to the auth backend as query params (non-secret); the token rides a header.
map $stream_orig_uri $stream_node_v {
    ~^/stream/(?<n>[^/]+)/   $n;
    default                  "";
}
map $stream_orig_uri $stream_key_v {
    ~^/stream/[^/]+/(?<k>[^/?]+)   $k;
    default                        "";
}

server {
    listen 80;
    listen [::]:80;
    server_name nexoraplay.net www.nexoraplay.net;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type "text/plain";
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name nexoraplay.net www.nexoraplay.net;

    ssl_certificate /etc/letsencrypt/live/nexoraplay.net/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/nexoraplay.net/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/nexoraplay.net/chain.pem;

    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    client_max_body_size 20m;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-Port $server_port;

    location = /health {
        proxy_pass http://nexora_api:8000/health;
    }

    location = /api/health {
        proxy_pass http://nexora_api:8000/health;
    }

    location ^~ /api/ {
        proxy_pass http://nexora_api:8000;
    }

    location ^~ /docs {
        proxy_pass http://nexora_api:8000;
    }

    location ^~ /redoc {
        proxy_pass http://nexora_api:8000;
    }

    location = /openapi.json {
        proxy_pass http://nexora_api:8000/openapi.json;
    }

    # ── Stream auth gate (FASE 2C) ──────────────────────────────────────────────
    # Nginx validates every /stream/* request against FastAPI before proxying to
    # Flussonic. Manifest carries ?token= (full validation + seeds a Redis grant);
    # tokenless segments pass only if covered by a grant (same node+stream+client IP).
    # Internal-only: not reachable directly from the internet.
    location = /__stream_auth {
        internal;
        # node + stream_key as query params (derived via maps); token via header.
        # $stream_*  vars are captured in the /stream/* location (rewrite phase) BEFORE
        # this subrequest; subrequests share the parent's `set` variable array, unlike
        # $request_uri/$arg_token which resolve to this subrequest (/__stream_auth).
        proxy_pass http://nexora_api:8000/internal/stream-auth/validate?node=$stream_node_v&stream_key=$stream_key_v;
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
        proxy_set_header X-Playback-Token $stream_token;
        proxy_set_header X-Real-IP        $remote_addr;
        proxy_set_header X-Forwarded-For  $remote_addr;
    }

    location ^~ /stream/ec-main/ {
        # Capture original URI + token into shared vars BEFORE the auth subrequest.
        set $stream_orig_uri $request_uri;
        set $stream_token $arg_token;
        auth_request /__stream_auth;
        error_page 401 = @stream_denied;
        error_page 403 = @stream_denied;
        access_log /dev/stdout stream_safe;

        proxy_pass http://181.78.246.211:8002/;
        proxy_http_version 1.1;
        proxy_set_header Host $proxy_host;
        proxy_set_header Range $http_range;
        proxy_set_header If-Range $http_if_range;
        proxy_buffering off;
        proxy_request_buffering off;
        proxy_read_timeout 60s;
        proxy_redirect off;
    }

    location ^~ /stream/co-main/ {
        set $stream_orig_uri $request_uri;
        set $stream_token $arg_token;
        auth_request /__stream_auth;
        error_page 401 = @stream_denied;
        error_page 403 = @stream_denied;
        access_log /dev/stdout stream_safe;

        proxy_pass http://38.210.187.13:8002/;
        proxy_http_version 1.1;
        proxy_set_header Host $proxy_host;
        proxy_set_header Range $http_range;
        proxy_set_header If-Range $http_if_range;
        proxy_buffering off;
        proxy_request_buffering off;
        proxy_read_timeout 60s;
        proxy_redirect off;
    }

    location @stream_denied {
        access_log /dev/stdout stream_safe;
        default_type application/json;
        return 401 '{"success":false,"error":"playback token required or invalid"}';
    }

    location / {
        proxy_pass http://nexora_web_player:80;
    }
}
