# Nginx — STAGING ONLY (staging.nexoraplay.net). NOT production.
# Gates /stream/* with FastAPI auth_request and proxies to the REAL Flussonic/Astra
# origins (read-only). Mounted at /etc/nginx/conf.d/default.conf by docker-compose.staging.yml.
#
# SSL: obtain the cert FIRST (see RUNBOOK_STAGING_REAL_EXECUTION.md), e.g. certbot
# --standalone with nginx stopped, then start nginx with this conf.
#
# upstream host name = api container (nexora_api_staging) on the staging network.

map $request_uri $loggable_uri {
    ~^(?<path_only>[^?]*)   $path_only;   # strip query (hides ?token=)
    default                 $request_uri;
}
log_format stream_safe '$remote_addr - [$time_local] "$request_method $loggable_uri $server_protocol" '
                       '$status $body_bytes_sent';

upstream nexora_api_staging_up {
    server nexora_api_staging:8000;
}

# ── HTTP :80 — ACME challenge + redirect to HTTPS ───────────────────────────────
server {
    listen 80;
    server_name staging.nexoraplay.net;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS :443 — the staging edge ───────────────────────────────────────────────
server {
    listen 443 ssl;
    http2 on;
    server_name staging.nexoraplay.net;

    ssl_certificate     /etc/letsencrypt/live/staging.nexoraplay.net/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/staging.nexoraplay.net/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    access_log /var/log/nginx/staging.access.log stream_safe;

    # Internal auth check — not reachable directly from the internet.
    location = /__stream_auth {
        internal;
        proxy_pass http://nexora_api_staging_up/internal/stream-auth/validate;
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
        proxy_set_header X-Original-URI   $request_uri;
        proxy_set_header X-Original-Args  $args;
        proxy_set_header X-Playback-Token $arg_token;
        proxy_set_header X-Real-IP        $remote_addr;
        proxy_set_header X-Forwarded-For  $remote_addr;
    }

    # ── Gated stream edges → REAL origins (read-only) ──────────────────────────
    location ^~ /stream/ec-main/ {
        auth_request /__stream_auth;
        error_page 401 = @stream_denied;
        error_page 403 = @stream_denied;
        proxy_pass http://181.78.246.211:8002/;          # Esmeraldas Astra
        proxy_http_version 1.1;
        proxy_set_header Host $proxy_host;
        proxy_set_header Range $http_range;
        proxy_set_header If-Range $http_if_range;
        proxy_buffering off;
        proxy_request_buffering off;
        proxy_read_timeout 60s;
        proxy_redirect off;
    }

    location ^~ /stream/co-main/ {
        auth_request /__stream_auth;
        error_page 401 = @stream_denied;
        error_page 403 = @stream_denied;
        proxy_pass http://38.210.187.13:8002/;           # Colombia
        proxy_http_version 1.1;
        proxy_set_header Host $proxy_host;
        proxy_set_header Range $http_range;
        proxy_set_header If-Range $http_if_range;
        proxy_buffering off;
        proxy_request_buffering off;
        proxy_read_timeout 60s;
        proxy_redirect off;
    }

    location ^~ /stream/ec-quito/ {
        auth_request /__stream_auth;
        error_page 401 = @stream_denied;
        error_page 403 = @stream_denied;
        proxy_pass http://45.70.202.171:8002/;           # Quito Astra
        proxy_http_version 1.1;
        proxy_set_header Host $proxy_host;
        proxy_set_header Range $http_range;
        proxy_set_header If-Range $http_if_range;
        proxy_buffering off;
        proxy_request_buffering off;
        proxy_read_timeout 60s;
        proxy_redirect off;
    }

    location @stream_denied {
        default_type application/json;
        return 401 '{"success":false,"error":"playback token required or invalid"}';
    }

    # Client/admin API + health → backend
    location /api/   { proxy_pass http://nexora_api_staging_up; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_set_header X-Forwarded-For $remote_addr; }
    location /health { proxy_pass http://nexora_api_staging_up; }

    # Optional web player (only when started with: docker compose --profile webplayer up).
    # The web_player container may be ABSENT. With a static `proxy_pass http://name`,
    # nginx resolves the upstream at STARTUP and fails hard ("host not found in
    # upstream") when it's missing — breaking the whole edge. To keep the API and
    # /stream/* working without the web player, defer resolution to request time:
    # use the Docker embedded resolver (127.0.0.11) + a variable in proxy_pass, so
    # nginx STARTS regardless, and returns 404 when the player is down.
    location / {
        resolver 127.0.0.11 valid=30s ipv6=off;
        set $webplayer http://nexora_web_player_staging:80;
        proxy_pass $webplayer;
        proxy_intercept_errors on;
        error_page 502 503 504 = @no_player;
    }
    location @no_player { return 404; }
}
